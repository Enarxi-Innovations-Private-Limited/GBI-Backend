global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'gbi-backend'
    metrics_path: '/metrics'
    scheme: 'http' # Change to https if needed
    static_configs:
      - targets: ['host.docker.internal:4000'] # Default for local testing
    # If testing production, add the production domain here instead
    # static_configs:
    #   - targets: ['api.gbiair.in:443']
